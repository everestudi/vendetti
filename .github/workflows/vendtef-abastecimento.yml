name: Vendtef abastecimento

# Disparado pelo Vercel (src/lib/vendetti/weverton-restock.ts) quando Luís
# aprova uma Decision de reposição do Weverton em /decisions.
# Roda o scraper que:
#   1. Loga no Vendtef
#   2. (Se necessário) cadastra produto novo + troca seleção do slot
#   3. Lança Operação de Estoque > Abastecimento na máquina BlueMall Rondon
#   4. Atualiza DB local (Reposicao + ReposicaoItem + Slot.currentQty)
#   5. Marca Decision EXECUTED/FAILED
#   6. Notifica grupo Operação no WhatsApp

on:
  workflow_dispatch:
    inputs:
      decision_id:
        description: 'Decision ID (SYSTEM_INVENTORY_SYNC com source=weverton-group)'
        required: true
        type: string
  repository_dispatch:
    types: [vendtef-abastecimento]

jobs:
  abastecer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run abastecimento
        env:
          HEADLESS: 'true'
          DECISION_ID: ${{ github.event.inputs.decision_id || github.event.client_payload.decision_id }}
        run: npm run vendtef:abastecimento-ci

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vendtef-abastecimento-${{ github.run_id }}
          path: tmp/vendtef-abastecimento/
          retention-days: 14
          if-no-files-found: ignore
