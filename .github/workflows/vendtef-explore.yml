name: Vendtef explore

on:
  workflow_dispatch:

jobs:
  explore:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install deps
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Explore Vendtef estoque pages
        env:
          HEADLESS: 'true'
        run: npx tsx src/scrapers/vendtef/explore-estoque.ts
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vendtef-explore-${{ github.run_id }}
          path: tmp/vendtef-entrada/
          retention-days: 7
          if-no-files-found: ignore
